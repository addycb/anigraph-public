# ------------------------
# Redirect HTTP to HTTPS
# ------------------------
server {
    listen 80;
    server_name anigraph.xyz www.anigraph.xyz;

    # Allow Certbot HTTP challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ------------------------
# HTTPS server
# ------------------------
server {
    listen 443 ssl http2;
    server_name anigraph.xyz www.anigraph.xyz;

    ssl_certificate /etc/letsencrypt/live/anigraph.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anigraph.xyz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_prefer_server_ciphers on;

    # Connection limit: max 15 concurrent connections per IP
    limit_conn addr 15;

    # ============================================
    # API Rate Limiting (most specific first)
    # ============================================

    # Block CSV processing endpoints entirely (use admin tools instead)
    location ~ ^/api/(split-csv|process-splits|ingest-split) {
        return 403 '{"error":"Endpoint disabled. Use admin interface."}';
        add_header Content-Type application/json;
    }

    # Heavy computation endpoints - STRICT limits → Go
    # Matches: user/compute-*
    location ~ ^/api/user/compute-(recommendations|taste-profile)$ {
        limit_req zone=heavy burst=3 nodelay;
        limit_req zone=global burst=50;

        proxy_pass http://backend:50051;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for heavy operations
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Search endpoints - moderate limits → Go
    location ~ ^/api/anime/(search|advanced-search)$ {
        limit_req zone=search burst=20 nodelay;
        limit_req zone=global burst=50;

        proxy_pass http://backend:50051;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Read-only data endpoints — cacheable (1 hour)
    location ~ ^/api/(anime/\d+|anime/\d+/relations|anime/\d+/recommendations|graph/\d+|staff/\d+|studio/[^/]+|franchise/\d+)$ {
        limit_req zone=graph burst=30 nodelay;
        limit_req zone=global burst=50;

        proxy_pass http://backend:50051;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=3600" always;
    }

    # Graph data endpoints → Go
    location ~ ^/api/graph/ {
        limit_req zone=graph burst=30 nodelay;
        limit_req zone=global burst=50;

        proxy_pass http://backend:50051;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin endpoints → Go server
    location /api/admin/ {
        limit_req zone=admin burst=10 nodelay;
        limit_req zone=global burst=50;

        proxy_pass http://backend:50051;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pipeline can take 10+ minutes
        proxy_read_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # Public API → Go server
    location /api/ {
        limit_req zone=global burst=50 nodelay;

        proxy_pass http://backend:50051/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # Frontend (SPA) → Go server (serves static files + index.html fallback)
    # ============================================
    location / {
        limit_req zone=global burst=100 nodelay;

        proxy_pass http://backend:50051;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ACME challenge for Certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
