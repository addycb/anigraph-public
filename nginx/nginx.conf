user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ============================================
    # Rate Limiting Zones
    # ============================================
    # Global limit: 300 requests/min per IP (~5 req/sec with bursts)
    limit_req_zone $binary_remote_addr zone=global:10m rate=300r/m;

    # Search endpoints: 60 requests/min per IP
    limit_req_zone $binary_remote_addr zone=search:10m rate=60r/m;

    # Heavy computation endpoints: 10 requests/min per IP
    limit_req_zone $binary_remote_addr zone=heavy:10m rate=10r/m;

    # Admin endpoints: 30 requests/min per IP
    limit_req_zone $binary_remote_addr zone=admin:10m rate=30r/m;

    # Graph data endpoints: 120 requests/min per IP
    limit_req_zone $binary_remote_addr zone=graph:10m rate=120r/m;

    # Connection limiting: max 15 concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Custom 429 response
    limit_req_status 429;
    limit_conn_status 429;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    include /etc/nginx/conf.d/*.conf;
}
