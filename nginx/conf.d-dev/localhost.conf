# ------------------------
# Development HTTP server
# ------------------------
server {
    listen 80;
    server_name localhost;

    # Vite HMR WebSocket support
    location /__vite_hmr {
        proxy_pass http://vue-app:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Vite dev assets
    location /@vite/ {
        proxy_pass http://vue-app:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /src/ {
        proxy_pass http://vue-app:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /node_modules/ {
        proxy_pass http://vue-app:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Admin API → Go server
    location /api/admin/ {
        proxy_pass http://backend:50051/api/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    # Public API → Go server
    location /api/ {
        proxy_pass http://backend:50051/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Umami Analytics Dashboard - strip /analytics prefix
    location /analytics/ {
        proxy_pass http://umami:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location = /analytics {
        return 301 /analytics/;
    }

    # SPA → Vite dev server (must be last)
    location / {
        proxy_pass http://vue-app:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
