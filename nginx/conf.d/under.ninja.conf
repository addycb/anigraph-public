# ------------------------
# Redirect HTTP to target URL
# ------------------------
server {
    listen 80;
    server_name under.ninja www.under.ninja;

    # Allow Certbot HTTP challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to target anime page
    location / {
        return 301 https://anigraph.xyz/anime/138788;
    }
}

# ------------------------
# HTTPS server - redirect to target URL
# ------------------------
server {
    listen 443 ssl http2;
    server_name under.ninja www.under.ninja;

    ssl_certificate /etc/letsencrypt/live/under.ninja/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/under.ninja/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_prefer_server_ciphers on;

    # Redirect to target anime page
    location / {
        return 301 https://anigraph.xyz/anime/138788;
    }

    # ACME challenge for Certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

