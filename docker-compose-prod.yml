version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: anigraph-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - ./nginx/conf.d-prod:/etc/nginx/conf.d:ro,z
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    depends_on:
      - backend
    networks:
      - anigraph-network
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: anigraph-backend
    environment:
      - PORT=50051
      - SPA_DIR=/app/vue-dist
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=anigraph
      - POSTGRES_USER=anigraph
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-anigraph}
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    depends_on:
      - postgres
      - elasticsearch
    volumes:
      - ./data:/app/data:z
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - anigraph-network
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.0

  neo4j:
    profiles: ["pipeline"]
    build:
      context: ./neo4j
      dockerfile: Dockerfile
    container_name: anigraph-neo4j
    environment:
      - NEO4J_AUTH=none
      - NEO4J_PLUGINS=["apoc","apoc-extended"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_extended=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_dbms_memory_heap_initial__size=2g
      - NEO4J_dbms_memory_heap_max__size=2g
      - NEO4J_server_memory_pagecache_size=2g
      - RESET_PORT=7475
    ports:
      - "7475:7475"  # Reset endpoint (internal use)
    networks:
      - anigraph-network
    restart: unless-stopped
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - ./data/neo4j_import:/var/lib/neo4j/import
    mem_limit: 5g
    cpus: 1.0

  postgres:
    image: postgres:16-alpine
    container_name: anigraph-postgres
    environment:
      - POSTGRES_DB=anigraph
      - POSTGRES_USER=anigraph
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-anigraph}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - anigraph-network
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.0
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: anigraph-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2500m -Xmx2500m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - anigraph-network
    restart: unless-stopped
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    mem_limit: 3g
    cpus: 2.0

  umami-db:
    image: postgres:15-alpine
    container_name: anigraph-umami-db
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=umami
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    networks:
      - anigraph-network
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: anigraph-umami
    environment:
      - DATABASE_URL=postgresql://umami:umami@umami-db:5432/umami
      - DATABASE_TYPE=postgresql
      - APP_SECRET=${UMAMI_APP_SECRET}
    depends_on:
      - umami-db
    networks:
      - anigraph-network
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5

  certbot:
    image: certbot/certbot
    container_name: anigraph-certbot
    volumes:
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot --deploy-hook 'nginx -s reload'; done"
    restart: unless-stopped
    networks:
      - anigraph-network
    mem_limit: 128m
    cpus: 0.25

networks:
  anigraph-network:
    driver: bridge
    enable_ipv6: true

volumes:
  neo4j-data:
  neo4j-logs:
  postgres-data:
  elasticsearch-data:
  umami-db-data:

